                    <td class="text-end" style="font-family:monospace; font-size:0.82rem; color:#8b8b00;">${cached}</td>
                    <td class="text-end stat-cost" style="font-family:monospace; font-size:0.82rem;">${cost}</td>
                </tr>`;
        }).join('');

        content.innerHTML = `
            <div class="d-flex align-items-center gap-3 mb-3">
                <span class="badge bg-secondary">${rows.length} exchange${rows.length !== 1 ? 's' : ''} with usage data</span>
                <small class="text-secondary">Double-click any row to open that exchange</small>
            </div>
            <div style="overflow-x:auto;">
                <table class="table table-hover table-sm align-middle" style="font-size:0.88rem;">
                    <thead class="table-dark" style="position:sticky; top:0; z-index:2;">${header}</thead>
                    <tbody>${body}</tbody>

    }

    // ---- Tab 2: Estimated Daily Usage --------------------------------------

    const MONTHLY_BUDGET = 300;

    function renderDailyUsage() {
        destroyChart();
        const content = document.getElementById('stats-content');

        if (statsData.length === 0) {
            content.innerHTML = noDataHtml('bi-calendar3');
            return;
        }

        // Build date labels (YYYY-MM-DD) for the last N days in local time
        const now    = new Date();
        const labels = [];
        for (let i = statsWindow - 1; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
            labels.push(d.toLocaleDateString('en-CA'));
        }

        // Build complete all-time daily aggregation maps
        const allCostsByDate   = {};
        const allInputByDate   = {};
        const allOutputByDate  = {};
        const allCachedByDate  = {};
        for (const row of statsData) {
            if (!row.session_start) continue;
            const key = new Date(row.session_start).toLocaleDateString('en-CA');
            allCostsByDate[key]  = (allCostsByDate[key]  || 0) + row._cost;
            allInputByDate[key]  = (allInputByDate[key]  || 0) + (row.usage.input_tokens              || 0);
            allOutputByDate[key] = (allOutputByDate[key] || 0) + (row.usage.output_tokens             || 0);
            allCachedByDate[key] = (allCachedByDate[key] || 0) + (row.usage.cache_read_input_tokens   || 0);
        }

        // Visible-window series
        const costs        = labels.map(l => allCostsByDate[l]  || 0);
        const inputTokens  = labels.map(l => allInputByDate[l]  || 0);
        const outputTokens = labels.map(l => allOutputByDate[l] || 0);
        const cachedTokens = labels.map(l => allCachedByDate[l] || 0);
        const total        = costs.reduce((a, b) => a + b, 0);

        // Remaining monthly budget (needs full month rollup, not just the window)
        const remaining = labels.map(dateStr => {
            const d          = new Date(dateStr + 'T12:00:00');
            const monthStart = new Date(d.getFullYear(), d.getMonth(), 1)
                                   .toLocaleDateString('en-CA');
            let spent = 0;
            for (let cur = new Date(monthStart + 'T12:00:00');
                 cur.toLocaleDateString('en-CA') <= dateStr;
                 cur.setDate(cur.getDate() + 1)) {
                spent += allCostsByDate[cur.toLocaleDateString('en-CA')] || 0;
            }
            return Math.max(0, MONTHLY_BUDGET - spent);
        });

        const dispLabels = labels.map(l =>
            new Date(l + 'T12:00:00').toLocaleDateString([], { month: 'short', day: 'numeric' }));

        const todayRemaining = remaining[remaining.length - 1];
        const tickSize       = statsWindow <= 30 ? 11 : statsWindow <= 90 ? 9 : 8;

        const windowBtns = [
            [7,   '1 Week'],
            [14,  '2 Weeks'],
            [30,  '1 Month'],
            [180, '6 Months'],
            [365, '1 Year'],
        ].map(([d, label]) =>
            `<button class="btn btn-sm btn-outline-secondary py-0 px-2${d === statsWindow ? ' active' : ''}"
                     onclick="setStatsWindow(${d})" style="font-size:0.8rem;">${escHtml(label)}</button>`
        ).join('');

        content.innerHTML = `
            <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
                <span class="text-secondary" style="font-size:0.82rem;">Window:</span>
                <div class="btn-group btn-group-sm">${windowBtns}</div>
                <button class="btn btn-sm py-0 px-2 ms-2 ${showTokens ? 'btn-info' : 'btn-outline-secondary'}"
                        onclick="toggleTokenBars()" style="font-size:0.8rem;"
                        title="Show input / output / cached token bars">
                    <i class="bi bi-bar-chart-steps me-1"></i>Tokens
                </button>
                <span class="ms-2 badge bg-secondary">Period spend: ${fmtCost(total)}</span>
                <span class="badge" style="background:#e3a811; color:#000;">
                    Budget remaining today: ${fmtCost(todayRemaining)}
                </span>
            </div>
            <div style="position:relative; height:420px;">
                <canvas id="daily-chart"></canvas>
            </div>`;

        // Left axis shows either cost or token counts — never both at the same time.
        const barDatasets = showTokens
            ? [
                {
                    type: 'bar', label: 'Input tokens',  data: inputTokens,
                    yAxisID: 'y',
                    backgroundColor: 'rgba(88,166,255,0.6)',  borderColor: '#58a6ff',
                    borderWidth: 1, borderRadius: 4, order: 2,
                },
                {
                    type: 'bar', label: 'Output tokens', data: outputTokens,
                    yAxisID: 'y',
                    backgroundColor: 'rgba(188,140,255,0.6)', borderColor: '#bc8cff',
                    borderWidth: 1, borderRadius: 4, order: 2,
                },
                {
                    type: 'bar', label: 'Cached tokens', data: cachedTokens,
                    yAxisID: 'y',
                    backgroundColor: 'rgba(86,211,199,0.6)',  borderColor: '#56d3c7',
                    borderWidth: 1, borderRadius: 4, order: 2,
                },
            ]
            : [
                {
                    type: 'bar', label: 'Daily spend', data: costs,
                    yAxisID: 'y',
                    backgroundColor: costs.map(c =>
                        c > 0 ? 'rgba(63,185,80,0.6)' : 'rgba(100,100,100,0.15)'),
                    borderColor: costs.map(c =>
                        c > 0 ? '#3fb950' : 'rgba(100,100,100,0.3)'),
                    borderWidth: 1, borderRadius: 4, order: 2,
                },
            ];

        const datasets = [
            ...barDatasets,
            {
                type: 'line', label: 'Budget remaining', data: remaining,
                yAxisID: 'y1',
                borderColor: '#e3a811', backgroundColor: 'rgba(227,168,17,0.08)',
                borderWidth: 2,
                pointRadius: statsWindow <= 30 ? 3 : 1, pointHoverRadius: 5,
                pointBackgroundColor: '#e3a811',
                tension: 0.3, fill: false, order: 1,
            },
        ];

        // Left axis adapts its label and tick format to the active mode
        const yAxis = showTokens
            ? {
                position: 'left',
                grid: { color: 'rgba(255,255,255,0.06)' },
                title: { display: true, text: 'Tokens', color: '#8b949e', font: { size: 10 } },
                ticks: { color: '#8b949e', font: { size: 11 }, callback: v => fmtTokens(v) },
                beginAtZero: true,
            }
            : {
                position: 'left',
                grid: { color: 'rgba(255,255,255,0.06)' },
                title: { display: true, text: 'Daily spend', color: '#3fb950', font: { size: 10 } },
                ticks: { color: '#3fb950', font: { size: 11 }, callback: v => v === 0 ? '$0' : fmtCost(v) },
                beginAtZero: true,
            };

        const ctx = document.getElementById('daily-chart').getContext('2d');
        window._dailyChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: dispLabels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        display: true,
                        labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 14 },
                    },
                    tooltip: {
                        callbacks: {
                            label: item => {
                                const v   = item.parsed.y;
                                const lbl = item.dataset.label;
                                if (lbl === 'Budget remaining')
                                    return '  Budget remaining: ' + fmtCost(v);
                                if (lbl === 'Daily spend')
                                    return '  Daily spend: ' + (v > 0 ? fmtCost(v) : 'none');
                                return `  ${lbl}: ${fmtTokens(v)}`;
                            },
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.06)' },
                        ticks: {
                            color: '#8b949e',
                            font: { size: tickSize },
                            maxRotation: statsWindow > 60 ? 45 : 0,
                        }
                    },
                    y: yAxis,
                    y1: {
                        position: 'right',
                        grid: { drawOnChartArea: false },
                        min: 0, max: MONTHLY_BUDGET,
                        title: { display: true, text: 'Budget remaining', color: '#e3a811', font: { size: 10 } },
                        ticks: { color: '#e3a811', font: { size: 11 }, callback: v => fmtCost(v) },
                    },
                }
            }
        });
    }

    // ---- Tab 3: Cache Efficiency -------------------------------------------

    function renderCacheEfficiency() {
        destroyChart();
        const content = document.getElementById('stats-content');

        if (statsData.length === 0) {
            content.innerHTML = noDataHtml('bi-lightning-charge');
            return;
        }

        // ── Build date labels for the visible window ──────────────────────
        const now = new Date();
        const labels = [];
        for (let i = statsWindow - 1; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
            labels.push(d.toLocaleDateString('en-CA'));
        }

        // ── Aggregate all-time daily maps (needed for accurate window slice) ──
        const byDate = {};
        for (const row of statsData) {
            if (!row.session_start) continue;
            const key = new Date(row.session_start).toLocaleDateString('en-CA');
            if (!byDate[key]) byDate[key] = { input: 0, cacheRead: 0, cacheCreate: 0, savings: 0 };
            const u = row.usage;
            byDate[key].input       += u.input_tokens                || 0;
            byDate[key].cacheRead   += u.cache_read_input_tokens     || 0;
            byDate[key].cacheCreate += u.cache_creation_input_tokens || 0;
            byDate[key].savings     += calcCacheSavings(u, row.model);
        }

        const zero = () => ({ input: 0, cacheRead: 0, cacheCreate: 0, savings: 0 });
        const wd        = labels.map(l => byDate[l] || zero());
        const cacheReads    = wd.map(d => d.cacheRead);
        const cacheCreates  = wd.map(d => d.cacheCreate);
        const savingsPerDay = wd.map(d => d.savings);
        const hitRates      = wd.map(d => {
            const tot = d.input + d.cacheRead;
            return tot > 0 ? +(d.cacheRead / tot * 100).toFixed(1) : null;
        });

        // ── Summary figures ───────────────────────────────────────────────
        const totalSavings  = statsData.reduce((s, r) => s + calcCacheSavings(r.usage, r.model), 0);
        const windowSavings = savingsPerDay.reduce((a, b) => a + b, 0);
        const allTimeReads  = statsData.reduce((s, r) => s + (r.usage.cache_read_input_tokens || 0), 0);
        const allTimeInput  = statsData.reduce((s, r) => s + (r.usage.input_tokens || 0), 0);
        const overallHitRate = allTimeInput + allTimeReads > 0
            ? ((allTimeReads / (allTimeInput + allTimeReads)) * 100).toFixed(1) : '0';

        // ── Hit rate by prompt position (all-time, not windowed) ──────────
        // Bucket positions 0-9 individually; 10+ combined.
        const MAX_POS = 10;
        const posBuckets = Array.from({ length: MAX_POS + 1 }, () => ({ sum: 0, count: 0 }));
        for (const row of statsData) {
            const pos = Math.min(row.prompt_index || 0, MAX_POS);
            const u   = row.usage;
            const tot = (u.input_tokens || 0) + (u.cache_read_input_tokens || 0);
            if (!tot) continue;
            const hr = (u.cache_read_input_tokens || 0) / tot * 100;
            posBuckets[pos].sum   += hr;
            posBuckets[pos].count += 1;

        // ── Chart A: token volume + hit rate ──────────────────────────────
        const ctx1 = document.getElementById('cache-chart-tokens').getContext('2d');
        cacheCharts.push(new Chart(ctx1, {

        const barColour = v => {

    // ---- Tab 4: Context Usage ----------------------------------------------

    function renderContextUsage() {
        destroyChart();
        const content = document.getElementById('stats-content');

        const withCtx = statsData.filter(r => r.context_tokens > 0);
        if (withCtx.length === 0) {
            content.innerHTML = noDataHtml('bi-graph-up');
            return;
        }

        // Group by project directory (cwd). Each cwd entry merges all session
        // files for that project — Claude Code splits a long conversation into
        // multiple JSONL files when the context window is exhausted, but from
        // the user's perspective it is one continuous session.
        const cwdMap = new Map(); // cwd → { cwd, rows[], sessionIds Set }
        for (const row of withCtx) {
            const key = row.session_cwd || '(unknown)';
            if (!cwdMap.has(key)) cwdMap.set(key, { cwd: key, rows: [], sessionIds: new Set() });
            const entry = cwdMap.get(key);
            entry.rows.push(row);
            entry.sessionIds.add(row.session_id);
        }

        // Sort entries newest-first (by latest session_start within the group)
        const projects = [...cwdMap.values()].map(e => {
            const latest = e.rows.reduce((m, r) => r.session_start > m ? r.session_start : m, '');
            return { ...e, latest };
        }).sort((a, b) => b.latest.localeCompare(a.latest));

        // Default to newest project
        if (!selectedContextSession || !cwdMap.has(selectedContextSession)) {
            selectedContextSession = projects[0].cwd;
        }

        const options = projects.map(p => {
            const nSess = p.sessionIds.size;
            const label = `${shortPath(p.cwd)}  ·  ${p.rows.length} prompts` +
                          (nSess > 1 ? `  (${nSess} session files)` : '');
            const sel = p.cwd === selectedContextSession ? 'selected' : '';
            return `<option value="${escHtml(p.cwd)}" ${sel}>${escHtml(label)}</option>`;
        }).join('');

        content.innerHTML = `
            <div class="mb-3 p-3 rounded" style="background:var(--bs-tertiary-bg);">
                <div class="fw-semibold mb-1"><i class="bi bi-graph-up me-1 text-info"></i>Context Window Usage</div>
                <div class="text-secondary" style="font-size:0.82rem;">
                    Context window fill at each prompt turn. When Claude Code exhausts the context window it
                    starts a new session file — those resets appear as <strong style="color:#adb5bd;">⟳</strong> drops on the chart.
                </div>
            </div>
            <div class="mb-3 d-flex align-items-center gap-2">
                <label class="text-secondary mb-0" style="font-size:0.82rem; white-space:nowrap;">Project</label>
                <select id="ctx-session-select" class="form-select form-select-sm"
                        style="max-width:560px; font-size:0.82rem; background:var(--bs-tertiary-bg);"
                        onchange="window._onCtxSessionChange(this.value)">
                    ${options}
                </select>
            </div>
            <div style="position:relative; height:340px;">
                <canvas id="ctx-chart"></canvas>
            </div>
            <div class="mt-3 d-flex flex-wrap gap-4" style="font-size:0.79rem; color:var(--bs-secondary-color);">
                <span><span style="display:inline-block;width:28px;border-top:2px dashed rgba(63,185,80,0.6);vertical-align:middle;margin-right:4px;"></span>50% · 100k</span>
                <span><span style="display:inline-block;width:28px;border-top:2px dashed rgba(227,168,17,0.7);vertical-align:middle;margin-right:4px;"></span>75% · 150k</span>
                <span><span style="display:inline-block;width:28px;border-top:2px dashed rgba(220,53,69,0.7);vertical-align:middle;margin-right:4px;"></span>90% · 180k</span>
                <span>⟳ = context reset (new session file)</span>
                <span class="ms-auto"><i class="bi bi-info-circle me-1"></i>
                    Above 75%: earlier context may receive less attention — consider starting a fresh session.</span>
            </div>`;

        window._onCtxSessionChange = function(cwd) {
            selectedContextSession = cwd;
            if (window._ctxChart) { window._ctxChart.destroy(); window._ctxChart = null; }
            drawContextChart(cwdMap);
        };

        drawContextChart(cwdMap);
    }

    function drawContextChart(cwdMap) {
        const project = cwdMap.get(selectedContextSession);
        if (!project) return;

        // Sort all rows for this project: by session start time, then prompt_index within session
        const rows = [...project.rows].sort((a, b) => {
            const sd = (a.session_start || '').localeCompare(b.session_start || '');
            return sd !== 0 ? sd : (a.prompt_index || 0) - (b.prompt_index || 0);
        });

        // Find indices where a new session file starts (context reset points)
        const resetIndices = new Set();
        let lastSessId = null;
        rows.forEach((r, i) => {
            if (lastSessId !== null && r.session_id !== lastSessId) resetIndices.add(i);
            lastSessId = r.session_id;
        });

        const labels      = rows.map((_, i) => `#${i + 1}`);
        const values      = rows.map(r => r.context_tokens || 0);
        const pcts        = values.map(v => Math.min(100, v / CONTEXT_WINDOW * 100));
        const pointColors = pcts.map(p => contextColor(p));
        const pointRadii  = rows.map((_, i) => resetIndices.has(i) ? 7 : 5);
        const pointStyles = rows.map((_, i) => resetIndices.has(i) ? 'triangle' : 'circle');

        const ctx  = document.getElementById('ctx-chart').getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 340);
        grad.addColorStop(0,    'rgba(220,53,69,0.22)');
        grad.addColorStop(0.25, 'rgba(227,168,17,0.12)');
        grad.addColorStop(0.55, 'rgba(63,185,80,0.08)');
        grad.addColorStop(1,    'rgba(63,185,80,0.01)');

        const refLine = (val, color) => ({
            data: labels.map(() => val),
            borderColor: color, borderDash: [5, 4], borderWidth: 1.5,
            pointRadius: 0, fill: false, tension: 0, label: null,
        });

        window._ctxChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Context tokens',
                        data: values,
                        borderColor: 'rgba(130,190,255,0.85)',
                        backgroundColor: grad,
                        fill: true,
                        tension: 0.35,
                        pointRadius: pointRadii,
                        pointHoverRadius: 8,
                        pointStyle: pointStyles,
                        pointBackgroundColor: pointColors,
                        pointBorderColor: pointColors,
                        borderWidth: 2,
                        order: 1,
                    },
                    { ...refLine(100000, 'rgba(63,185,80,0.6)'),  label: '50% (100k)', order: 2 },
                    { ...refLine(150000, 'rgba(227,168,17,0.7)'), label: '75% (150k)', order: 3 },
                    { ...refLine(180000, 'rgba(220,53,69,0.7)'),  label: '90% (180k)', order: 4 },
                ],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { labels: { color: '#adb5bd', font: { size: 11 }, boxWidth: 18,
                        filter: item => item.text !== null } },
                    tooltip: {
                        callbacks: {
                            label: c => {
                                if (c.datasetIndex !== 0) return c.dataset.label;
                                const v = c.parsed.y;
                                const p = (v / CONTEXT_WINDOW * 100).toFixed(1);
                                return `Context: ${fmtTokens(v)} tokens (${p}%)`;
                            },
                            afterBody: items => {
                                const i   = items[0]?.dataIndex;
                                const row = rows[i];
                                const lines = [];
                                if (resetIndices.has(i)) lines.push('⟳  Context reset — new session file');
                                if (row?.prompt_text) lines.push(`"${row.prompt_text.substring(0, 80)}${row.prompt_text.length > 80 ? '…' : ''}"`);
                                return lines;
                            },
                        },
                    },
                },
                scales: {
                    x: {
                        ticks: { color: '#6c757d', font: { size: 11 },
                            callback: (_, i) => resetIndices.has(i) ? `⟳ #${i+1}` : `#${i+1}` },
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        title: { display: true, text: 'Prompt', color: '#6c757d', font: { size: 11 } },
                    },
                    y: {
                        min: 0,
                        max: Math.max(CONTEXT_WINDOW, ...values) * 1.05,
                        ticks: { color: '#6c757d', font: { size: 11 }, callback: v => fmtTokens(v) },
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        title: { display: true, text: 'Context tokens', color: '#6c757d', font: { size: 11 } },
                    },
                },
            },
        });
    }

    // ---- Tab 5: Cost by Project --------------------------------------------

    function renderProjectCost() {
        destroyChart();
        const content = document.getElementById('stats-content');

        if (statsData.length === 0) {
            content.innerHTML = noDataHtml('bi-pie-chart');
            return;
        }

        // Aggregate cost per project (cwd)
        const costMap = new Map(); // cwd → { label, cost, prompts, sessions Set }
        for (const row of statsData) {
            const key = row.session_cwd || '(unknown)';
            if (!costMap.has(key)) costMap.set(key, { label: shortPath(key), cost: 0, prompts: 0, sessions: new Set() });
            const e = costMap.get(key);
            e.cost    += row._cost;
            e.prompts += 1;
            e.sessions.add(row.session_id);
        }

        // Sort by cost descending
        const projects = [...costMap.entries()]
            .map(([cwd, e]) => ({ cwd, ...e, sessionCount: e.sessions.size }))
            .sort((a, b) => b.cost - a.cost);

        const totalCost = projects.reduce((s, p) => s + p.cost, 0);

        // Palette — enough colours for up to 20 projects
        const PALETTE = [
            '#4e9af1','#f4a63a','#4dc88a','#e05252','#a78bfa',
            '#f472b6','#38bdf8','#fb923c','#34d399','#f87171',
            '#60a5fa','#fbbf24','#6ee7b7','#fc8181','#c4b5fd',
            '#f9a8d4','#7dd3fc','#fdba74','#6fcf97','#ef9a9a',
        ];

        const labels  = projects.map(p => p.label);
        const values  = projects.map(p => p.cost);
        const colors  = projects.map((_, i) => PALETTE[i % PALETTE.length]);

        // Build summary table rows
        const tableRows = projects.map((p, i) => {
            const pct  = totalCost > 0 ? (p.cost / totalCost * 100).toFixed(1) : '0.0';
            const swatch = `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${colors[i]};margin-right:6px;"></span>`;
            return `<tr>
                <td>${swatch}${escHtml(p.label)}</td>
                <td class="text-end">${p.sessionCount}</td>
                <td class="text-end">${p.prompts.toLocaleString()}</td>
                <td class="text-end fw-semibold" style="color:${colors[i]}">$${p.cost.toFixed(4)}</td>
                <td class="text-end text-secondary">${pct}%</td>
            </tr>`;
        }).join('');

        content.innerHTML = `
            <div class="mb-3 p-3 rounded" style="background:var(--bs-tertiary-bg);">
                <div class="fw-semibold mb-1"><i class="bi bi-pie-chart me-1 text-info"></i>Cost by Project</div>
                <div class="text-secondary" style="font-size:0.82rem;">
                    Estimated total spend grouped by project directory, across all sessions.
                    Total: <strong>$${totalCost.toFixed(4)}</strong>
                </div>
            </div>
            <div class="d-flex gap-4 align-items-start flex-wrap">
                <div style="position:relative; width:340px; height:340px; flex-shrink:0;">
                    <canvas id="project-pie-chart"></canvas>
                </div>
                <div class="flex-grow-1" style="min-width:280px; overflow-x:auto;">
                    <table class="table table-sm table-hover" style="font-size:0.82rem;">
                        <thead>
                            <tr>
                                <th>Project</th>
                                <th class="text-end">Sessions</th>
                                <th class="text-end">Prompts</th>
                                <th class="text-end">Cost</th>
                                <th class="text-end">Share</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                        <tfoot>
                            <tr class="fw-semibold border-top">
                                <td>Total</td>
                                <td class="text-end">${[...new Set(statsData.map(r => r.session_id))].length}</td>
                                <td class="text-end">${statsData.length.toLocaleString()}</td>
                                <td class="text-end">$${totalCost.toFixed(4)}</td>
                                <td class="text-end">100%</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>`;

        const ctx = document.getElementById('project-pie-chart').getContext('2d');
        window._projectPieChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels,
                datasets: [{
                    data: values,
                    backgroundColor: colors,
                    borderColor: 'rgba(0,0,0,0.3)',
                    borderWidth: 2,
                    hoverOffset: 8,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false,
                    },
                    tooltip: {
                        callbacks: {
                            label: c => {
                                const p = totalCost > 0 ? (c.parsed / totalCost * 100).toFixed(1) : 0;
                                return ` $${c.parsed.toFixed(4)}  (${p}%)`;
                            },
                        },
                    },
                },
                cutout: '55%',
            },
        });
    }

    // ---- Helpers -----------------------------------------------------------

    function noDataHtml(icon) {
        return `<div class="text-center py-5 text-secondary">
            <i class="bi ${escHtml(icon)} d-block mb-2" style="font-size:2.5rem;"></i>
            <p>No usage data found.</p>
            <small>Token stats will appear once Claude Code starts writing usage fields to session files.</small>
        </div>`;
    }
})();

// ---------------------------------------------------------------------------
// Auto-refresh + init
// ---------------------------------------------------------------------------
setInterval(() => loadSessions(false), 5000);

(async function init() {
    await loadSessions(true);
    if (state.sessions.length > 0) {
        await loadSession(state.sessions[0].id, true);
    }
})();
</script>
</body>
</html>
